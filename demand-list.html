<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>需求清单｜红祺腾达科研服务</title>
  <link rel="stylesheet" href="assets/css/hqt-redesign.css">
  <style>
    body{margin:0;background:#f5f7fb;color:#0f172a;font-family:Arial,"Microsoft YaHei",sans-serif}
    .wrap{max-width:1080px;margin:0 auto;padding:32px 20px 90px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
    .top h1{margin:0;font-size:30px}.top p{margin:7px 0 0;color:#64748b}
    .back{padding:10px 16px;border:1px solid #dbe3ee;border-radius:10px;background:#fff;color:#334155;text-decoration:none}
    .card{padding:22px;border:1px solid #e2e8f0;border-radius:16px;background:#fff;box-shadow:0 8px 28px rgba(15,23,42,.06)}
    .item{display:grid;grid-template-columns:1fr auto;gap:18px;padding:18px 0;border-bottom:1px solid #edf1f6}
    .item:last-child{border-bottom:0}.code{color:#1677ff;font-size:13px;font-weight:700}.name{display:block;margin-top:5px;font-size:18px}.desc{display:block;margin-top:7px;color:#64748b;font-size:13px;line-height:1.6}
    .actions{display:flex;align-items:center;gap:10px}.qty-stepper{display:flex;align-items:center;border:1px solid #cbd9e7;border-radius:10px;overflow:hidden}.qty-stepper button{width:34px;height:34px;border:0;background:#f2f7fb;color:#075f9b;font-size:18px;cursor:pointer}.qty-stepper input{width:46px;height:34px;border:0;border-left:1px solid #dbe5ee;border-right:1px solid #dbe5ee;text-align:center;font-weight:700}.remove{border:0;background:#fff1f2;color:#be123c;padding:8px 11px;border-radius:9px;cursor:pointer}
    .empty{text-align:center;padding:70px 20px;color:#64748b}.empty strong{display:block;margin-bottom:10px;color:#0f172a;font-size:20px}
    .summary{display:flex;justify-content:space-between;align-items:center;gap:15px;margin-top:20px;padding-top:18px;border-top:1px solid #e2e8f0}
    .summary b{font-size:18px}.bottom-actions{display:flex;gap:12px}.btn{padding:12px 18px;border-radius:10px;text-decoration:none;border:0;cursor:pointer;font-weight:700}
    .secondary{background:#f1f5f9;color:#334155}.primary{background:#1677ff;color:#fff}
    .direct-order{margin-top:20px;padding:20px;border:1px solid #dbe7f1;border-radius:14px;background:#f8fbfe}
    .direct-order h3{margin:0 0 8px}.direct-order p{margin:0 0 16px;color:#64748b}
    .direct-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.direct-grid label{display:flex;flex-direction:column;gap:6px;font-size:14px}.direct-grid input,.direct-grid textarea{padding:11px 12px;border:1px solid #cbd9e7;border-radius:9px;font:inherit}.direct-grid textarea{min-height:80px;resize:vertical}.direct-grid .full{grid-column:1/-1}.direct-status{margin-top:12px;font-size:14px}
    @media(max-width:640px){.direct-grid{grid-template-columns:1fr}}
    @media(max-width:640px){.top,.summary{align-items:flex-start;flex-direction:column}.item{grid-template-columns:1fr}.bottom-actions{width:100%}.btn{flex:1;text-align:center}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div><h1>需求清单</h1><p>AI、计算模拟、分析表征和耗材项目均可在当前清单直接提交。</p></div>
      <a class="back" href="index.html">返回首页</a>
    </div>
    <section class="card">
      <div id="demandList"></div>
      <div id="demandSummary"></div>
    </section>
  </main>
  <script src="assets/js/demand-list-v1131.js?v=20260723-v1168"></script>
</body>
</html>
